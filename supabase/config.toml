# Paymi Supabase local/CLI config
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "paymi"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true

[functions.parse-receipt]
verify_jwt = true
